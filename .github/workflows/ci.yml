name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Compile package
        run: python -m compileall -q emulator

      - name: Lint
        run: ruff check .

      - name: Run tests when present
        shell: bash
        run: |
          if find tests -type f -name 'test_*.py' -print -quit 2>/dev/null | grep -q .; then
            pytest -q
          else
            echo "No tests discovered yet; compile and lint checks passed."
          fi

  container:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build container
        run: docker build --tag og-emulator:ci .
